<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title if title else 'Annotation App' }}</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260410-7" />
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <h1>Medical Translation Annotation</h1>
            <nav>
                {% if current_user %}
                    <span class="user-badge">{{ current_user.email }} ({{ current_user.role }})</span>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js?v=20260410-7"></script>
    <script src="/static/health_professional_workspace.js?v=20260410-8"></script>
</body>
</html>
